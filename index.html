<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Love Page</title>
    <style>
        /* ====== CSS ====== */

        /* صفحة الباسورد */
        body {
            margin:0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('https://i.postimg.cc/KY49hDV7/SN.jpg') no-repeat center center/cover;
            backdrop-filter: blur(6px);
        }

        .password-box {
            background: rgba(255,255,255,0.5);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .password-box input {
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            width: 80%;
            font-size: 16px;
        }

        .password-box button {
            padding: 10px 20px;
            margin-top: 10px;
            border:none;
            border-radius:10px;
            background-color:#ff5c5c;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        /* صفحة المحتوى */
        #content-screen {
            display:none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align:center;
            height:100vh;
            background: pink;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-in-out;
        }

        #content-screen h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        #content-screen p {
            font-size: 1.2em;
            max-width: 500px;
        }

        /* تأثير القلوب */
        @keyframes floatHearts {
            0% { transform: translateY(100vh) rotate(0deg); opacity:1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity:0; }
        }

        .heart {
            position: absolute;
            color: red;
            font-size: 24px;
            animation: floatHearts 5s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity:0; }
            to { opacity:1; }
        }
    </style>
</head>
<body>
    <!-- صفحة الباسورد -->

            <input type="password" id="password-input
