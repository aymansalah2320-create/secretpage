<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Secret Page</title>
<style>
  body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #ff0080, #7928ca, #ff8c00);
    background-size: 600% 600%;
    animation: gradientBG 15s ease infinite;
    color:white;
    text-align:center;
    display:none; /* نخفي المحتوى لحد ما يدخل الباسورد */
  }

  @keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  h1, p {
    opacity:0;
    transform: translateY(20px);
    animation: fadeInUp 1s forwards;
  }

  h1 { animation-delay: 0.5s; font-size:2.5em; }
  p  { animation-delay: 1.2s; font-size:1.5em; }

  @keyframes fadeInUp {
    to {opacity:1; transform: translateY(0);}
  }

  img {
    margin-top: 20px;
    max-width: 300px;
    border-radius: 15px;
    opacity:0;
    transform: scale(0.8);
    animation: imgIn 1s forwards;
    animation-delay: 2s;
  }

  @keyframes imgIn {
    to {opacity:1; transform: scale(1);}
  }
</style>
</head>
<body>

<h1>🔥 مرحبا بك 🔥</h1>
<p>دي رسالة سرية مخصوص ليك بالظبط زي الموقع الأصلي 😎</p>
<img src="https://i.postimg.cc/8CXsm7fC/secret-image.jpg">

<script>
const password = "sandra"; // الباسورد اللي انت طلبته
const userPass = prompt("ادخل الباسورد:");

if(userPass === password){
    document.body.style.display = "flex"; // يظهر المحتوى بعد الباسورد
} else {
    alert("الباسورد غلط!");
    document.body.innerHTML = "<h1>Access Denied</h1>";
}
</script>

</body>
</html>
